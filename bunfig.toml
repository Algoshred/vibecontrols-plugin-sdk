[install]
exact = true

[run]
shell = "bun"

# Resolve @burdenoff/* and @vibecontrols/* packages from npmjs (public).
# CI rewrites this file with the same npmjs scopes + NPM_TOKEN.
[install.scopes]
burdenoff = { token = "$NPM_TOKEN", url = "https://registry.npmjs.org/" }
vibecontrols = { token = "$NPM_TOKEN", url = "https://registry.npmjs.org/" }
