# PR Check — gated as `pr-gate` required check.
# 3-OS sanity matrix; ubuntu-latest blocking, others advisory.

name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ matrix.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ matrix.os }}-

      - name: Configure Verdaccio scoped registry
        run: |
          AUTH=$(echo -n "ci-publisher:${{ secrets.VERDACCIO_CI_PASSWORD }}" | base64)
          cat > bunfig.toml << EOF
          [install]
          exact = true
          [install.scopes]
          vibecontrols = { token = "${AUTH}", url = "https://verdaccio.tooling.internal.burdenoff.com/" }
          burdenoff = { token = "${AUTH}", url = "https://verdaccio.tooling.internal.burdenoff.com/" }
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sanity
        run: bun run sanity

  pr-gate:
    name: PR Gate
    if: always()
    needs: [sanity]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.sanity.result }}" = "failure" ] || [ "${{ needs.sanity.result }}" = "cancelled" ]; then
            echo "Sanity job failed or was cancelled"
            exit 1
          fi
          echo "PR gate passed"
