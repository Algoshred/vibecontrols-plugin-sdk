# Release — publish a vibe-plugin-* package to npmjs (public).
#
# Trigger: workflow_dispatch (manual version) or CalVer git-tag push.
# Replace `@vibecontrols/vibe-plugin-EXAMPLE` with the real package name.

name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "CalVer version (YYYY.MDD.PATCH). Leave empty to auto-compute."
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release to npmjs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run sanity
      - run: bun run build
      - name: Publish to npmjs
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bunx npm publish --access public
