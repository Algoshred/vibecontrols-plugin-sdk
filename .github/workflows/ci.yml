# CI — Sanity (3-OS matrix) on every push to main and PR
#
# Runs `bun run sanity` per OS. Windows + macOS are advisory (continue-on-error).

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ matrix.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ matrix.os }}-

      - name: Configure npmjs scoped registry
        run: |
          cat > bunfig.toml << 'BUNFIG'
          [install]
          exact = true
          [install.scopes]
          vibecontrols = { token = "$NPM_TOKEN", url = "https://registry.npmjs.org/" }
          burdenoff = { token = "$NPM_TOKEN", url = "https://registry.npmjs.org/" }
          BUNFIG
          sed -i 's/^ *//' bunfig.toml
          echo "NPM_TOKEN=$NPM_TOKEN" >> "$GITHUB_ENV"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sanity
        run: bun run sanity
