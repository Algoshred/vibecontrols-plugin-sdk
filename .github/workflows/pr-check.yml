      - name: OpenCode review (Ollama Qwen3.5)
        continue-on-error: true
        uses: anomalyco/opencode/github@latest
        with:
          model: ollama-cloud/qwen3.5:397b
          use_github_token: true
          share: false
          prompt: |
            Your entire response is posted as exactly ONE GitHub PR comment. Do not use tools to post comments.
            Inline diff comments are not available for OpenCode; cite file paths and line numbers in the comment body.

            Begin the comment with this exact heading (first line):
            **AI Review — Ollama Qwen3.5** (`ollama-cloud/qwen3.5:397b`)

            Review this pull request:
            - Check for code quality issues
            - Look for potential bugs and security issues
            - Suggest improvements and best practices
            - Don't modify any files
            - Tag each finding with [BUG], [SECURITY], [IMPROVEMENT], [BEST PRACTICE] and [LOW], [MEDIUM], or [HIGH]
            - If there are no issues, say "No issues found. Good job!"

  opencode-go-review:
    name: OpenCode Review (Deepseek v4 Pro)
    needs: [pr-gate]
    if: github.event_name == 'pull_request' && needs.pr-gate.result == 'success'
    runs-on: ubuntu-latest
