[install]
exact = true

[run]
shell = "bun"

# Local dev: resolve @burdenoff/* and @vibecontrols/* plugins from Verdaccio.
# Public releases also flow through npmjs. CI may overwrite this file
# per-environment.
[install.scopes]
burdenoff = { token = "$NPM_TOKEN", url = "https://registry.npmjs.org/" }
vibecontrols = { token = "$NPM_TOKEN", url = "https://registry.npmjs.org/" }
